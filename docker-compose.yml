services:
  gabarito-frontend-build:
    container_name: gabarito-frontend-build
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/dist:/app/dist-out
    entrypoint: sh -c "rm -rf /app/dist-out/* && cp -rf /usr/share/nginx/html/. /app/dist-out/"
    restart: "no"

  gabarito-api:
    container_name: gabarito-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/gabarito.db
      - SUPERADMIN_TOKEN=${SUPERADMIN_TOKEN:-}
      - SUPERADMIN_ALLOWED_IPS=${SUPERADMIN_ALLOWED_IPS:-}
      - SUPERADMIN_SESSION_TTL_MINUTES=${SUPERADMIN_SESSION_TTL_MINUTES:-0}
      - ACCESS_LOG_RETENTION_DAYS=${ACCESS_LOG_RETENTION_DAYS:-90}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    env_file:
      - .env
    volumes:
      - ./data/prod:/app/data:z
    restart: always
    depends_on:
      gabarito-frontend-build:
        condition: service_completed_successfully
    networks:
      - proxy

networks:
  proxy:
    external: true